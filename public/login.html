<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RKL Trading Login</title>

<style>
body {
  font-family: Arial;
  background: #0b1727;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111c2e;
  padding:30px;
  border-radius:20px;
  width:350px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2 { text-align:center; }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
  color:#ff4d4d;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 RKL Trading Bot</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="msg"></div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/auth/login-password', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.ok) {
    window.location.href = '/dashboard';
  } else {
    document.getElementById('msg').innerText = data.message;
  }
}
</script>

</body>
</html>
